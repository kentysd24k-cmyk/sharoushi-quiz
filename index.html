<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>社労士 過去問クイズ</title>
<meta name="description" content="社会保険労務士試験 択一式過去問クイズ（オフライン対応）">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0d9488">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/icon-192.png">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="社労士クイズ">
<link rel="stylesheet" href="./style.css">
</head>
<body>

<header class="app-header">
  <button id="btnBack" class="icon-btn" hidden aria-label="戻る">←</button>
  <h1 id="headerTitle">社労士 過去問クイズ</h1>
  <button id="btnHeaderStats" class="icon-btn" aria-label="成績">📊</button>
  <button id="btnHeaderSettings" class="icon-btn" aria-label="設定">⚙️</button>
</header>

<main id="app">

  <!-- 科目選択画面 -->
  <section id="screen-home" class="screen active">
    <div class="search-bar">
      <input type="search" id="searchInput" class="search-input" placeholder="🔍 問題・解説・ノートを検索" autocomplete="off">
      <button id="btnSearchClear" class="search-clear-btn" hidden aria-label="検索をクリア">✕</button>
    </div>

    <div id="searchResults" class="search-results" hidden>
      <p class="search-results-count" id="searchResultsCount"></p>
      <div class="search-results-section">
        <h3 class="search-results-heading">問題</h3>
        <div id="searchQuestionList"></div>
      </div>
      <div class="search-results-section">
        <h3 class="search-results-heading">ノート</h3>
        <div id="searchNoteList"></div>
      </div>
    </div>

    <div id="searchNormalContent">
      <div class="feature-nav">
        <button id="btnGoNotes" type="button" class="feature-nav-btn">
          <span class="feature-nav-icon">📓</span><span>ノート</span>
        </button>
        <button id="btnGoAnalysis" type="button" class="feature-nav-btn">
          <span class="feature-nav-icon">📊</span><span>分析</span>
        </button>
      </div>

      <p class="lead">年度と科目を選んで学習を始めましょう</p>
      <div class="year-chips" id="yearChipsHome"></div>
      <div class="subject-grid" id="subjectGrid"></div>

      <div class="home-actions">
        <button id="btnRandomAll" class="btn btn-primary">🔀 ランダム出題</button>
        <button id="btnReview" class="btn btn-outline">
          📝 復習モード <span class="badge" id="reviewCount">0</span>
        </button>
      </div>
    </div>
  </section>

  <!-- クイズ画面 -->
  <section id="screen-quiz" class="screen">
    <div class="quiz-topbar">
      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      <span class="progress-text" id="progressText">1 / 10</span>
    </div>

    <div class="question-card">
      <p class="subject-tag" id="quizSubjectTag"></p>
      <p class="question-text" id="questionText"></p>
      <ol class="sub-items" id="subItems"></ol>
    </div>

    <div class="choices" id="choicesList"></div>

    <div class="feedback" id="feedback" hidden>
      <p class="feedback-text" id="feedbackText"></p>
    </div>

    <div class="post-answer-actions" id="postAnswerActions" hidden>
      <button id="btnShowExplanation" class="btn btn-outline">📖 解説を見る</button>
      <button id="btnNext" class="btn btn-primary">次の問題へ →</button>
    </div>
  </section>

  <!-- セッション結果画面 -->
  <section id="screen-session-result" class="screen">
    <h2>お疲れさまでした</h2>
    <p class="score-big" id="sessionScore">0 / 0</p>
    <p class="score-sub" id="sessionScoreRate"></p>
    <div class="session-list" id="sessionBreakdown"></div>
    <div class="home-actions">
      <button id="btnRetryWrong" class="btn btn-outline" hidden>間違えた問題だけ復習する</button>
      <button id="btnBackHome" class="btn btn-primary">科目選択に戻る</button>
    </div>
  </section>

  <!-- 成績画面 -->
  <section id="screen-stats" class="screen">
    <h2>成績</h2>
    <div class="year-chips" id="yearChipsStats"></div>
    <div class="stats-overall" id="statsOverall"></div>
    <div class="stats-subject-list" id="statsBySubject"></div>
    <div class="home-actions">
      <button id="btnResetHistory" class="btn btn-danger-outline">学習履歴をリセット</button>
    </div>
  </section>

  <!-- ノート一覧画面 -->
  <section id="screen-notes" class="screen">
    <h2>ノート</h2>
    <button id="btnNewNote" type="button" class="btn btn-primary">+ 新規作成</button>
    <div class="year-chips" id="noteFilterChips"></div>
    <div class="notes-list" id="notesList"></div>
  </section>

  <!-- ノート編集画面 -->
  <section id="screen-note-edit" class="screen">
    <h2 id="noteEditHeading">ノートを作成</h2>

    <div id="noteLinkedQuestion" class="note-linked-question" hidden>
      <button type="button" id="btnGoToLinkedQuestion" class="note-linked-question-btn"></button>
    </div>

    <label class="form-label" for="noteEditTitle">タイトル</label>
    <input type="text" id="noteEditTitle" class="form-input" placeholder="タイトルを入力">

    <label class="form-label">科目タグ</label>
    <div class="tag-chip-row" id="noteSubjectTags"></div>

    <label class="form-label" for="noteFreeTagInput">自由タグ</label>
    <div class="tag-chip-row" id="noteFreeTagList"></div>
    <input type="text" id="noteFreeTagInput" class="form-input" placeholder="タグを入力してEnter">

    <label class="form-label" for="noteEditBody">本文</label>
    <textarea id="noteEditBody" class="form-textarea" rows="14" placeholder="メモを入力"></textarea>

    <div class="note-edit-actions">
      <button id="btnSaveNote" type="button" class="btn btn-primary">保存</button>
      <button id="btnDeleteNote" type="button" class="btn btn-danger-outline" hidden>このノートを削除</button>
    </div>
  </section>

  <!-- 分析画面 -->
  <section id="screen-analysis" class="screen">
    <h2>分析</h2>
    <div class="year-chips" id="yearChipsAnalysis"></div>

    <div class="analysis-card">
      <p class="analysis-card-title">科目別正答率</p>
      <div class="chart-wrap chart-wrap-radar"><canvas id="chartRadar"></canvas></div>
    </div>

    <div class="analysis-card">
      <p class="analysis-card-title">年度別正答率</p>
      <div class="chart-wrap"><canvas id="chartYearBar"></canvas></div>
    </div>

    <div class="analysis-card">
      <p class="analysis-card-title">直近7日間の学習量</p>
      <div class="chart-wrap chart-wrap-small"><canvas id="chartDaily"></canvas></div>
    </div>

    <button id="btnWeakSubjects" type="button" class="btn btn-primary">🎯 苦手科目だけを集中出題</button>

    <div class="analysis-card">
      <p class="analysis-card-title">苦手問題ランキング</p>
      <div id="weakRankingList" class="weak-ranking-list"></div>
    </div>
  </section>

  <!-- 設定画面 -->
  <section id="screen-settings" class="screen">
    <h2>設定</h2>
    <div class="settings-section">
      <p class="settings-desc">
        学習履歴・ノートなど、このアプリのデータをまとめてバックアップ/復元できます。
        機種変更やブラウザのキャッシュ削除の前に、エクスポートしておくことをおすすめします。
      </p>
      <button id="btnExportData" type="button" class="btn btn-outline">📤 データをエクスポート</button>
      <label for="importFileInput" class="btn btn-outline file-btn">📥 データをインポート</label>
      <input type="file" id="importFileInput" accept="application/json" hidden>
    </div>
  </section>

</main>

<div class="sheet-backdrop" id="sheetBackdrop" hidden></div>
<div class="explanation-sheet" id="explanationSheet" hidden aria-hidden="true">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <h3>📖 解説</h3>
    <button id="btnCloseSheet" class="icon-btn sheet-close" aria-label="閉じる">✕</button>
  </div>
  <div class="sheet-body" id="explanationCard"></div>
  <div class="sheet-footer">
    <button id="btnAddToNote" class="btn btn-outline">📝 この問題をノートに追加</button>
    <button id="btnNextFromSheet" class="btn btn-primary">次の問題へ →</button>
  </div>
</div>

<div class="update-toast" id="updateToast" hidden role="status">
  <span class="update-toast-text">🔄 新しいバージョンがあります</span>
  <div class="update-toast-actions">
    <button id="btnUpdateNow" class="update-toast-btn">更新する</button>
    <button id="btnDismissUpdate" class="update-toast-dismiss" aria-label="閉じる">✕</button>
  </div>
</div>

<script src="./vendor/chart.umd.min.js"></script>
<script src="./app.js"></script>
</body>
</html>
